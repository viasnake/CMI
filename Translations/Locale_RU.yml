  setwarp:
    help:
      info: Устанавливает местоположение деформации
      args: '[warpName] (reqPermission) (рука/head/head:[playerName]) (слот) (автоматическое знание) (-g:[groupName]) (мир;x;y;z;рыскание;шаг) (-confirm)'
      explanation:
      - 'Примеры:'
      - /cmi setwarp spawn - простая трансформация для появления.
      - /cmi setwarp spawn true — создает деформацию и для ее использования потребуется узел разрешения cmi.command.warp.[warpname]
      - /cmi setwarp spawnhand - создает деформацию, берет предмет из руки для отображения в графическом интерфейсе для этой деформации.
      - /cmi setwarp spawn 13 — создает деформацию и устанавливает слот графического интерфейса для использования в графическом интерфейсе (1-54)
      - /cmi setwarp spawn true Hand 13 — создает варп с иконкой из руки, слот 13 и требует разрешения
      - /cmi setwarp spawn true Hand 13 false — то же, что и предыдущее, но не генерирует знания
    info:
      newSet: '{gcp}Новый набор основы (&6[warp]{gcp})'
      noSet: '{gcw}Варп с таким именем уже существует'
      noMore: '{gcw}Вы достигли максимально допустимого предела варпа. ({gcps}[max]{gcp})'
