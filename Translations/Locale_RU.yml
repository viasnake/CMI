  bossbarmsg:
    help:
      info: Отправляет сообщение босс-бара игроку
      args: '[playerName/all] (-sec:[seconds])(-t:[timeToKeepFor]) (-n:nameOfBar) (-p:[maxValue/current]) (-c:[color]) (-s:[1,6,10,12,20]) (-cmd:"команда;;команда2") (-pcmd:"команда;;команда2") (-a:[ticks]) [message] (-cancel:nameOfBar)'
      explanation:
      - PlaceHolderAPI поддерживается для продвижения и отправки текстовых сообщений самостоятельно.
      - Время определяется обычным способом, например, 1 с — это одна секунда, а 1 м — одна минута. Это определит, как долго панель будет отображаться для игрока, прежде чем она автоматически скроется.
      - nameOfBar — это опция, и при определении того же самого, текущий бар будет обновляться новой информацией.
      - 'цвета могут быть: красный, зеленый, розовый, фиолетовый, белый, желтый'
      - максимальное и текущее значения определяют заполнение панели, переменные PlaceHolderAPI можно использовать для динамических обновлений.
      - 'Примеры:'
      - /cmi боссбар Zrips BossBarTitle
      - /cmi Bossbarmsg all -t:1s -p:%server_max_players%/%server_online% -n:testbar -c:red &2Название бара %server_online%/%server_max_players% &e%cmi_user_name%
      - /cmi Bossbarmsg all -p:+1 -n:testbar - добавит один процент к текущей полосе прогресса по имени
      - /cmi Bossbarmsg all -p:-1 -n:testbar - удалит один процент из текущей полосы прогресса по имени
      - /cmi Bossbarmsg all -s:10 -n:testbar - установит стиль боссбара на 10 сегментов по имени бара
      - /cmi Bossbarmsg all -sec:5 - будет считаться в течение 5 секунд от 0 до 5
      - /cmi Bossbarmsg all -sec:-5 - будет считаться в течение 5 секунд от 5 до 0
      - '-cmd: будет выполнять команды либо для одного игрока, если целью является конкретный игрок, либо только один раз, если для всех (всех). Это не приведет к тому, что переведенные переменные будут лежать на [playerName], если они используются с переменной «all». Вместо этого используйте -pcmd:'
      - '-pcmd: будет выполнять команды каждому игроку, если целью является «все».'
      - https://www.zrips.net/cmi/commands/bossbarmsg-handling/
