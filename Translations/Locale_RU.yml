  setspawn:
    help:
      info: Устанавливает точку телепортации команды появления.
      args: (Имя игрока) (true/false) (-g:[groupName]) (-rng:[range]) (-w:world,world_nether) (-loc:[world;x;y;z;yaw;pitch])
      explanation:
      - Дополнительную информацию об использовании команд можно найти по адресу https://www.zrips.net/cmi/commands/spawn/.
