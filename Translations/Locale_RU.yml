  launch:
    help:
      info: Запускайте в том направлении, куда вы смотрите, или под углом.
      args: (Имя игрока) (p:[power]) (a:[angle]) (d:[direction]) (loc:[x]:[y]:[z]) (-nodamage)
      explanation:
      - cmi launch — запустится в том направлении, в котором вы смотрите
      - cmi launch -nodamage — запустит и предотвратит повреждение при падении
      - cmi launch p:3.2 - запустится с мощностью 3.2
      - cmi launch p:2.5 a:25 - запустится в направлении, куда вы смотрите, под углом 25 градусов и с увеличением 2,5.
      - cmi запускает Zrips d:east - запустит на восток под тем же углом, под которым вы смотрите
      - cmi launch Zrips d:0 - запустится в направлении 0 градусов (юг)
      - cmi запускает Zrips d:~180 - запустится в обратном направлении
      - cmi launch d:45 a:30 p:2 - запустит на юго-запад под углом 30 градусов с силой 2
      - cmi launch loc:150:120:123 — запустит плеер в целевую локацию
